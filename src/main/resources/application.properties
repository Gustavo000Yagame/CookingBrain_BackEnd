# Supabase normalmente assina os JWTs com HS256 usando um segredo simetrico
# (Settings -> API -> JWT Settings -> JWT Secret no painel do Supabase),
# nao com chaves assimetricas expostas via JWKS. Por isso usamos um
# JwtDecoder customizado (ver SecurityConfig.java) em vez de issuer-uri
# ou jwk-set-uri, que so funcionam com RS256/JWKS.
#
# IMPORTANTE: troque o valor abaixo pelo "JWT Secret" do seu projeto Supabase.
supabase.jwt.secret=COLOQUE_AQUI_O_JWT_SECRET_DO_PAINEL_SUPABASE

spring.datasource.hikari.data-source-properties.prepareThreshold=0

